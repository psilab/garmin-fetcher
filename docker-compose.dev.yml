services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - garmin_tokens:/tokens
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
      - BACKEND_URL=http://backend:8000

volumes:
  frontend_node_modules:
  garmin_tokens:
